<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Landing Page - ColourArea</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="layout-page">

  <aside class="sidebar-tools">
    <div class="tools-header">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <h2>Colour Tools</h2>
    </div>
    
    <div class="tool-group">
      <label for="colorPicker">Selected Element Color:</label>
      <div class="picker-row">
        <input type="color" id="colorPicker" value="#ffffff" disabled>
        <span id="selectedElementName" class="selected-text">None selected</span>
      </div>
      <small class="instruction">Click any section on the right to select it.</small>
    </div>

    <div class="tool-actions">
      <button id="resetColorsBtn" class="btn btn-outline" disabled>Reset Colors</button>
      <button id="copyColorsBtn" class="btn btn-primary" disabled>Copy HEX</button>
    </div>
  </aside>

  <main class="layout-canvas">
    
    <div class="mock-website saas-theme">
      
      <nav class="saas-nav colourable" data-element-name="SaaS Sticky Nav">
        <span>AppCloud</span>
        <button class="saas-nav-btn colourable" data-element-name="Login Button">Login</button>
      </nav>

      <section class="saas-hero colourable" data-element-name="SaaS Hero Area">
        <div class="saas-hero-text">
          <h1>Automate Your Workflow</h1>
          <p>The ultimate tool to sync your data across all cloud platforms instantly.</p>
          <button class="saas-hero-btn colourable" data-element-name="Main CTA Button">Start Free Trial</button>
        </div>
        <div class="saas-hero-placeholder colourable" data-element-name="App Image Placeholder">
        </div>
      </section>

      <section class="saas-pricing colourable" data-element-name="Pricing Area">
        <div class="pricing-card colourable" data-element-name="Basic Plan Card">
          <h3>Basic</h3>
          <span class="price">$9/mo</span>
          <button class="plan-btn colourable" data-element-name="Basic Button">Select</button>
        </div>
        <div class="pricing-card premium colourable" data-element-name="Pro Plan Card">
          <h3>Pro</h3>
          <span class="price">$29/mo</span>
          <button class="plan-btn colourable" data-element-name="Pro Button">Select</button>
        </div>
      </section>

    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
